name: 데이터 품질 주간 감사

# 매주 일요일 KST 04:00 — 핵심 필드 채움율 + 샘플 검증
# 임계 미달 시 exit 1 → workflow 실패 알림
on:
  workflow_dispatch:
  schedule:
    - cron: "0 19 * * 0"   # 일요일 19 UTC = 월요일 04:00 KST

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: "9.0.0" }
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: pnpm }
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm --filter @naktal/db exec prisma generate
      - name: 데이터 품질 감사
        working-directory: apps/crawler
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm ts-node src/scripts/audit-data-quality.ts
