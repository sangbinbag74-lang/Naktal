name: 나라장터 전체 역대 데이터 수집 (완료 — 비상시만 수동)

# 2002~2026 전수 수집 완료 (2026-04-19). g2b.yml daily가 증분 처리.
# 본 workflow는 재해복구·DB 초기화 시에만 수동 실행.
on:
  workflow_dispatch:
    inputs:
      from:
        description: "수집 시작월 (YYYYMM, 기본 201201)"
        required: false
        default: "201201"
      to:
        description: "수집 종료월 (YYYYMM, 기본 현재월)"
        required: false
        default: ""
      skip_bid:
        description: "낙찰결과 수집 건너뜀 (공고만 수집, true/false)"
        required: false
        default: "false"
      skip_ann:
        description: "공고 수집 건너뜀 (낙찰결과만 수집, true/false)"
        required: false
        default: "false"

jobs:
  bulk-import:
    name: G2B 전체 수집
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 최대 6시간

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9.0.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: 의존성 설치
        run: pnpm install --no-frozen-lockfile

      - name: 전체 데이터 수집
        working-directory: apps/crawler
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          G2B_API_KEY: ${{ secrets.G2B_API_KEY }}
          G2B_ANNOUNCE_KEY: ${{ secrets.G2B_API_KEY }}
        run: |
          FROM="${{ github.event.inputs.from || '201201' }}"
          TO="${{ github.event.inputs.to }}"
          if [ -z "$TO" ]; then
            TO=$(date +%Y%m)
          fi
          SKIP_BID="${{ github.event.inputs.skip_bid }}"
          SKIP_ANN="${{ github.event.inputs.skip_ann }}"
          CMD="pnpm ts-node src/bulk-import.ts --from $FROM --to $TO"
          if [ "$SKIP_BID" = "true" ]; then CMD="$CMD --skip-bid"; fi
          if [ "$SKIP_ANN" = "true" ]; then CMD="$CMD --skip-ann"; fi
          echo "실행: $CMD"
          eval $CMD

# trigger fix
