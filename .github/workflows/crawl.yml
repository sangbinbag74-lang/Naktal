name: G2B 나라장터 데이터 수집

on:
  # 매일 KST 23:00 (UTC 14:00) — 보조정보 수집 전 공고 목록 먼저 갱신
  schedule:
    - cron: "0 14 * * *"   # KST 23:00 (bulk-extras UTC 15:00, bulk-opening UTC 16:00 전)
  # 수동 실행 (과거 데이터 대량 수집 등)
  workflow_dispatch:
    inputs:
      type:
        description: "수집 타입 (announcement / bid-result / all)"
        required: false
        default: "all"
      from:
        description: "시작일 YYYYMMDD (과거 수집, 미입력 시 오늘)"
        required: false
      to:
        description: "종료일 YYYYMMDD (미입력 시 오늘)"
        required: false
      pages:
        description: "최대 페이지 수 (기본 10, 과거 수집 시 999)"
        required: false
        default: "10"

jobs:
  crawl:
    name: G2B API 데이터 수집
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9.0.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: 의존성 설치
        run: pnpm install --frozen-lockfile

      - name: G2B 데이터 수집 실행
        working-directory: apps/crawler
        env:
          G2B_API_KEY: ${{ secrets.G2B_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          TYPE="${{ github.event.inputs.type || 'announcement' }}"
          PAGES="${{ github.event.inputs.pages || '999' }}"
          FROM="${{ github.event.inputs.from }}"
          TO="${{ github.event.inputs.to }}"

          # 수동 입력 없을 경우 기본값: 30일 전 ~ 오늘 (진행중인 공고 전체 수집)
          if [ -z "$FROM" ]; then
            FROM=$(date -d '30 days ago' +%Y%m%d 2>/dev/null || date -v-30d +%Y%m%d)
          fi

          CMD="pnpm ts-node src/index.ts --type $TYPE --pages $PAGES --from $FROM"
          if [ -n "$TO" ]; then CMD="$CMD --to $TO"; fi

          echo "실행: $CMD"
          eval $CMD

      - name: 부종공종 채우기
        working-directory: apps/crawler
        env:
          G2B_API_KEY: ${{ secrets.G2B_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: pnpm ts-node src/index.ts --type fill-sub

      - name: A값(기초금액) 채우기
        working-directory: apps/crawler
        env:
          G2B_API_KEY: ${{ secrets.G2B_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: pnpm ts-node src/index.ts --type fill-avalue
